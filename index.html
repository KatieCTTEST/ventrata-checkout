<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: white; overflow-x: hidden; }
    #ventrata-wrap { width: 100%; max-width: 100%; padding: 0; }
  </style>
  <script
    src="https://cdn.checkout.ventrata.com/v3/production/ventrata-checkout.min.js"
    type="module"
    data-config='{"apiKey":"ca4a8bee-eacd-444f-b1a4-5f554ab5bd6a","env":"test"}'>
  </script>
</head>
<body>
  <div id="ventrata-wrap" style="width:100%;">
    <aside
      ventrata-embedded-widget
      style="display:block; width:100%; min-height:500px;"
      data-config='{"features":{"optionSelector":{"placement":"above-tickets","type":"expandable"}}}'>
    </aside>
  </div>
  <script>
    function sendHeight() {
      const h = document.body.scrollHeight;
      window.parent.postMessage({ type: 'ventrata-height', height: h }, '*');
    }
    setInterval(sendHeight, 500);
    window.addEventListener('load', sendHeight);
  </script>
</body>
</html>
