<!DOCTYPE html>
        <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
            html, body { width: 100%; background: transparent; overflow-x: hidden; }
        
            /* BUY TICKETS BUTTON */
            #buy-btn {
                    display: block;
                    width: 100%;
                    padding: 15px 32px;
                    background: #a72129;
                    color: white;
                    border: none;
                    font-family: sans-serif;
                    font-size: 13px;
                    font-weight: 700;
                    letter-spacing: 0.12em;
                    text-transform: uppercase;
                    cursor: pointer;
                    transition: background 0.2s;
            }
            #buy-btn:hover { background: #8a1920; }
        
            /* WIDGET AREA */
            #widget-wrap { display: none; width: 100%; }
        
            /* CLOSE BAR */
            #close-bar {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    padding: 10px 16px;
                    background: #1a1a1a;
                    color: white;
                    font-family: sans-serif;
                    font-size: 12px;
                    letter-spacing: 0.08em;
                    text-transform: uppercase;
            }
            #close-btn {
                    background: none;
                    border: 1px solid rgba(255,255,255,0.4);
                    color: white;
                    padding: 4px 12px;
                    font-size: 11px;
                    cursor: pointer;
                    letter-spacing: 0.06em;
            }
            #close-btn:hover { background: rgba(255,255,255,0.1); }
      </style>
          <script
            src="https://cdn.checkout.ventrata.com/v3/production/ventrata-checkout.min.js"
                  type="module"
                        data-config='{"apiKey":"ca4a8bee-eacd-444f-b1a4-5f554ab5bd6a","env":"test"}'>
                          </script>
  </head>
  <body>

      <button id="buy-btn" onclick="openWidget()">Buy Tickets</button>button>

      <div id="widget-wrap">
            <div id="close-bar">
                    <span>Select your tickets</span>
                  <button id="close-btn" onclick="closeWidget()">&#10005; Close</button>
            </div>
          <aside
                  ventrata-embedded-widget
                  style="display:block; width:100%;"
                  data-config='{"features":{"optionSelector":{"placement":"above-tickets","type":"expandable"}}}'>
          </aside>
      </div>
  
    <script>
        function openWidget() {
                document.getElementById('buy-btn').style.display = 'none';
                document.getElementById('widget-wrap').style.display = 'block';
                sendHeight();
        }
        function closeWidget() {
                document.getElementById('widget-wrap').style.display = 'none';
                document.getElementById('buy-btn').style.display = 'block';
                window.parent.postMessage({ type: 'ventrata-height', height: 46 }, '*');
        }
        function sendHeight() {
                const h = document.body.scrollHeight;
                window.parent.postMessage({ type: 'ventrata-height', height: h }, '*');
        }
        setInterval(sendHeight, 500);
        window.addEventListener('load', sendHeight);
    </script>
  
  </body>

  <body>
      <div id="ventrata-wrap" style="width:100%;">
            <aside
                    ventrata-embedded-widget
                    style="display:block; width:100%; min-height:500px;"
                    data-config='{"features":{"optionSelector":{"placement":"above-tickets","type":"expandable"}}}'>
            </aside>
      </div>

      <script>
            // Send real height to parent (Wix) whenever content changes
            function sendHeight() {
                    const h = document.body.scrollHeight;
                    window.parent.postMessage({ type: 'ventrata-height', height: h }, '*');
            }
            // Poll for height changes as widget loads and user interacts
            setInterval(sendHeight, 500);
            window.addEventListener('load', sendHeight);
      </script>
  </body>
